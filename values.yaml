# -- Reloader Annotation to trigger rolling updates on ConfigMap/Secret changes
annotations:
  reloader.stakater.com/auto: "true"

replicaCount: 1

# Rolling update — no downtime: new pod starts before old one is killed
updateStrategy:
  type: RollingUpdate
  rollingUpdate:
    maxUnavailable: 0
    maxSurge: 1

image:
  repository: mrnanda/expenses
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""

nameOverride: ""
fullnameOverride: ""

service:
  type: ClusterIP
  ports:
    http:
      port: 8080
      targetPort: 8080
      protocol: TCP
    grpc:
      port: 50051
      targetPort: 50051
      protocol: TCP

containerPort:
  http: 8080
  grpc: 50051

resources:
  requests:
    memory: "64Mi"
    cpu: "50m"
  limits:
    memory: "128Mi"
    cpu: "200m"

readinessProbe:
  httpGet:
    path: /v1/healthcheck
    port: http

livenessProbe:
  httpGet:
    path: /v1/healthcheck
    port: http

startupProbe:
  httpGet:
    path: /v1/healthcheck
    port: http

# ── Plain environment variables ───────────────────────────────────────────────
# Add any non-sensitive key/value pairs here.
# CI pipeline only needs to update image.tag — nothing else changes here.
env:
  GRPC_PORT: "50051"
  PORT: "8080"

# ── Secret environment variables ──────────────────────────────────────────────
# Each group maps envVarName → secretKey inside the named secret.
# To add a new secret group, just add a new block here — no template changes needed.
secrets:
  postgres:                           # ← $group name (not used in template)
    secretName: postgresdb-secret     # ← $group.secretName
    keys:
      DB_USERNAME: username           # ← $envName: $secretKey  
      DB_PASSWORD: password
      DB_HOST: host
      DB_NAME: name
      DB_PORT: port
      MAX_OPEN_CONN: maxOpenConn
      MAX_IDLE_CONN: maxIdleConn
  amqp:                               # ← second $group
    secretName: amqp-secret           # ← $group.secretName
    keys:
      AMQP_USERNAME: username         # ← $envName: $secretKey
      AMQP_PASSWORD: password
      AMQP_HOST: host
      AMQP_PORT: port
  pubsub:                            # ← third $group
    secretName: pubsub-secret        # ← $group.secretName
    keys:
      PUB_HOST: host                 # ← $envName: $secretKey
      PUB_PORT: port

# ── Horizontal Pod Autoscaler ─────────────────────────────────────────────────
hpa:
  enabled: true
  minReplicas: 1
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80
  scaleDown:
    stabilizationWindowSeconds: 300
    policies:
      - type: Percent
        value: 100
        periodSeconds: 15
  scaleUp:
    stabilizationWindowSeconds: 0
    policies:
      - type: Percent
        value: 100
        periodSeconds: 15
      - type: Pods
        value: 4
        periodSeconds: 15
    selectPolicy: Max
